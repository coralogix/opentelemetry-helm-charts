data:
  config.yaml: |
    ignore-missing-collector-crds: true
    enable-instrumentation-crds: false
    enable-multi-instrumentation: false
    instrumentations:
      spec:
        apachehttpd:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:1.0.4
        dotnet:
          env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://otel-collector:4318
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: http/protobuf
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.15.0
        env:
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_TRACES_SAMPLER
          value: always_on
        - name: OTEL_LOGS_EXPORTER
          value: none
        exporter:
          endpoint: http://otel-collector:4317
        java:
          env:
          - name: OTEL_INSTRUMENTATION_JDBC_ENABLED
            value: "false"
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.28.1
        nginx:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:1.0.4
        nodejs:
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.76.0
        propagators:
        - tracecontext
        - baggage
        python:
          env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://otel-collector:4318
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: http/protobuf
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.63b1
