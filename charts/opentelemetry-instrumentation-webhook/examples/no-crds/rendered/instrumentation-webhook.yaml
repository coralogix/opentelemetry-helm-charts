# Source: opentelemetry-instrumentation-webhook/templates/instrumentation-webhook.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-opentelemetry-instrumentation-webhook
  namespace: default
  labels:
    helm.sh/chart: opentelemetry-instrumentation-webhook-0.1.0
    app.kubernetes.io/name: opentelemetry-instrumentation-webhook
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "0.152.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: instrumentation-webhook-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-instrumentation-webhook
      app.kubernetes.io/instance: example
      app.kubernetes.io/component: instrumentation-webhook-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        checksum/config: 349cb60857c17c762dee232a85699e560ed3fa7e31740526801c3fdac268a842
      labels:
        app.kubernetes.io/name: opentelemetry-instrumentation-webhook
        app.kubernetes.io/instance: example
        app.kubernetes.io/component: instrumentation-webhook-manager
    spec:
      serviceAccountName: example-opentelemetry-instrumentation-webhook
      containers:
        - name: manager
          image: "ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator:0.152.0"
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --config-file=/etc/config.yaml
            - --metrics-addr=0.0.0.0:8080
            - --metrics-secure=false
            - --health-probe-addr=:8081
            - --webhook-port=9443
          env:
            - name: ENABLE_WEBHOOKS
              value: "true"
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
            - mountPath: /etc/config.yaml
              name: config
              subPath: config.yaml
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: example-opentelemetry-instrumentation-webhook-controller-manager-service-cert
        - name: config
          configMap:
            name: example-opentelemetry-instrumentation-webhook-manager-config
