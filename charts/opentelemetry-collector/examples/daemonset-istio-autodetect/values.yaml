mode: daemonset

presets:
  istioAutodetect:
    enabled: true
    logServiceNameCorrelation: true
  kubernetesAttributes:
    enabled: true

config:
  exporters:
    debug:
      verbosity: detailed

  service:
    pipelines:
      metrics:
        exporters:
          - debug
      logs:
        exporters:
          - debug

resources:
  limits:
    cpu: 100m
    memory: 200M
