mode: daemonset

presets:
  ebpfProfiler:
    enabled: true
    samplesPerSecond: 77
    obi_correlation:
      enabled: true
  otlpExporter:
    enabled: true
    endpoint: ${env:K8S_NODE_IP}:4317
    pipelines: ["profiles"]
    tls:
      insecure: true
  otlpReceiver:
    enabled: false
  # unsupported by ebpf profiler distro
  collectorMetrics:
    enabled: false

config:
  service:
    telemetry:
      resource:
        service.name: "opentelemetry-collector"
        cx.agent.type: "ebpf-profiler"
      logs:
        level: "debug"
