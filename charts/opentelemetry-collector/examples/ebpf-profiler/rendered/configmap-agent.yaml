---
# Source: opentelemetry-collector/templates/configmap-agent.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: example-opentelemetry-collector-agent
  namespace: default
  labels:
    helm.sh/chart: opentelemetry-collector-0.131.1
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "0.151.0"
    app.kubernetes.io/managed-by: Helm
    
data:
  relay: |
    exporters:
      otlp/agent:
        endpoint: ${env:K8S_NODE_IP}:4317
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
    receivers:
      profiling:
        off_cpu_threshold: 0
        probabilistic_interval: 1m
        probabilistic_threshold: 100
        reporter_interval: 5s
        samples_per_second: 77
        tracers: all
        verbose_mode: false
    service:
      extensions:
      - health_check
      pipelines:
        profiles:
          exporters:
          - otlp/agent
          processors:
          - memory_limiter
          receivers:
          - profiling
      telemetry:
        logs:
          encoding: json
          level: debug
        resource:
          cx.agent.type: ebpf-profiler
          service.name: opentelemetry-collector
