---
# Source: opentelemetry-collector/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: example-opentelemetry-collector
  namespace: default
  labels:
    helm.sh/chart: opentelemetry-collector-0.135.4
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "0.155.0"
    app.kubernetes.io/managed-by: Helm
    
data:
  relay: |
    exporters:
      coralogix/resource_catalog:
        application_name: resource
        domain: ""
        logs:
          headers:
            X-Coralogix-Distribution: helm-otel-integration/
            x-coralogix-ingress: metadata-as-otlp-logs/v1
        private_key: ${CORALOGIX_PRIVATE_KEY}
        sending_queue:
          batch:
            flush_timeout: 250ms
            max_size: 2097152
            min_size: 1048576
            sizer: bytes
          enabled: true
          num_consumers: 20
          queue_size: 209715200
          sizer: bytes
        subsystem_name: catalog
        timeout: 30s
      debug: {}
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    processors:
      filter/workflow:
        error_mode: silent
        logs:
          log_record:
          - log.body["object"]["kind"] == "Pod" and not IsMatch(String(log.body["object"]["metadata"]["ownerReferences"]),
            ".*StatefulSet.*|.*ReplicaSet.*|.*Job.*|.*DaemonSet.*")
          - log.body["kind"] == "Pod" and not IsMatch(String(log.body["metadata"]["ownerReferences"]),
            ".*StatefulSet.*|.*ReplicaSet.*|.*Job.*|.*DaemonSet.*")
      filter/workflow-custom:
        error_mode: silent
        logs:
          log_record:
          - body["kind"] == "Service"
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resourcedetection/resource_catalog:
        azure:
          resource_attributes:
            azure.resourcegroup.name:
              enabled: false
            azure.vm.name:
              enabled: false
            azure.vm.scaleset.name:
              enabled: false
            azure.vm.size:
              enabled: false
            host.id:
              enabled: false
            host.name:
              enabled: false
        detectors:
        - gcp
        - ec2
        - azure
        - eks
        ec2:
          resource_attributes:
            host.id:
              enabled: false
            host.image.id:
              enabled: false
            host.name:
              enabled: false
            host.type:
              enabled: false
        eks:
          node_from_env_var: K8S_NODE_NAME
        gcp:
          resource_attributes:
            host.id:
              enabled: false
            host.name:
              enabled: false
            host.type:
              enabled: false
            k8s.cluster.name:
              enabled: false
        override: true
        timeout: 2s
      transform/entity-event:
        error_mode: silent
        log_statements:
        - context: log
          statements:
          - set(log.attributes["otel.entity.interval"], Milliseconds(Duration("1h")))
      transform/kubernetes_transform:
        error_mode: silent
        log_statements:
        - replace_all_patterns(log.attributes, "value", "^(?s).{257,}$", "REDACTED")
      transform/prometheus:
        error_mode: ignore
        metric_statements:
        - context: metric
          statements:
          - replace_pattern(metric.name, "_total$", "") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_process_cpu_seconds_seconds$", "otelcol_process_cpu_seconds")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_process_runtime_heap_alloc_bytes_bytes$",
            "otelcol_process_runtime_heap_alloc_bytes") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_process_runtime_total_alloc_bytes_bytes$",
            "otelcol_process_runtime_total_alloc_bytes") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_process_runtime_total_sys_memory_bytes_bytes$",
            "otelcol_process_runtime_total_sys_memory_bytes") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_fileconsumer_open_files$", "otelcol_fileconsumer_open_files_ratio")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_fileconsumer_reading_files$", "otelcol_fileconsumer_reading_files_ratio")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_ip_lookup_miss$", "otelcol_otelsvc_k8s_ip_lookup_miss_ratio")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_added$", "otelcol_otelsvc_k8s_pod_added_ratio")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_updated$", "otelcol_otelsvc_k8s_pod_updated_ratio")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_deleted$", "otelcol_otelsvc_k8s_pod_deleted_ratio")
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_accepted_log_records$",
            "otelcol_processor_accepted_log_records") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_accepted_metric_points$",
            "otelcol_processor_accepted_metric_points") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_accepted_spans$",
            "otelcol_processor_accepted_spans") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_refused_log_records$",
            "otelcol_processor_refused_log_records") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_refused_metric_points$",
            "otelcol_processor_refused_metric_points") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_memory_limiter_refused_spans$",
            "otelcol_processor_refused_spans") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - replace_pattern(metric.name, "^otelcol_processor_filter_spans\\.filtered$",
            "otelcol_processor_filter_spans.filtered_ratio") where resource.attributes["service.name"]
            == "opentelemetry-collector"
        - context: resource
          statements:
          - set(resource.attributes["k8s.pod.ip"], resource.attributes["net.host.name"])
            where resource.attributes["service.name"] == "opentelemetry-collector"
          - delete_key(resource.attributes, "service_name") where resource.attributes["service.name"]
            == "opentelemetry-collector"
        - context: datapoint
          statements:
          - delete_key(datapoint.attributes, "service_name") where resource.attributes["service.name"]
            == "opentelemetry-collector"
          - delete_key(datapoint.attributes, "otel_scope_name") where datapoint.attributes["service.name"]
            == "opentelemetry-collector"
      transform/remove_managed_fields:
        error_mode: silent
        log_statements:
        - context: log
          statements:
          - delete_key(log.body["object"]["metadata"], "managedFields")
          - delete_key(log.body["metadata"], "managedFields")
    receivers:
      k8sobjects/resource_catalog:
        objects:
        - group: ""
          initial_delay: 0s
          mode: pull
          name: namespaces
        - group: ""
          initial_delay: 5s
          mode: pull
          name: nodes
        - group: ""
          initial_delay: 10s
          mode: pull
          name: persistentvolumeclaims
        - group: ""
          initial_delay: 15s
          mode: pull
          name: persistentvolumes
        - group: ""
          initial_delay: 20s
          mode: pull
          name: pods
        - group: ""
          initial_delay: 25s
          mode: pull
          name: services
        - group: apps
          initial_delay: 30s
          mode: pull
          name: daemonsets
        - group: apps
          initial_delay: 35s
          mode: pull
          name: deployments
        - group: apps
          initial_delay: 40s
          mode: pull
          name: replicasets
        - group: apps
          initial_delay: 45s
          mode: pull
          name: statefulsets
        - group: autoscaling
          initial_delay: 50s
          mode: pull
          name: horizontalpodautoscalers
        - group: batch
          initial_delay: 55s
          mode: pull
          name: cronjobs
        - group: batch
          initial_delay: 60s
          mode: pull
          name: jobs
        - group: extensions
          initial_delay: 65s
          mode: pull
          name: ingresses
        - group: networking.k8s.io
          initial_delay: 65s
          mode: pull
          name: ingresses
        - group: policy
          initial_delay: 70s
          mode: pull
          name: poddisruptionbudgets
        - group: rbac.authorization.k8s.io
          initial_delay: 75s
          mode: pull
          name: clusterrolebindings
        - group: rbac.authorization.k8s.io
          initial_delay: 80s
          mode: pull
          name: clusterroles
        - group: rbac.authorization.k8s.io
          initial_delay: 85s
          mode: pull
          name: rolebindings
        - group: rbac.authorization.k8s.io
          initial_delay: 90s
          mode: pull
          name: roles
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: ""
          mode: watch
          name: namespaces
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: ""
          mode: watch
          name: nodes
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: ""
          mode: watch
          name: persistentvolumeclaims
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: ""
          mode: watch
          name: persistentvolumes
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: ""
          mode: watch
          name: pods
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: apps
          mode: watch
          name: daemonsets
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: apps
          mode: watch
          name: deployments
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: apps
          mode: watch
          name: replicasets
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: apps
          mode: watch
          name: statefulsets
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: autoscaling
          mode: watch
          name: horizontalpodautoscalers
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: batch
          mode: watch
          name: cronjobs
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: batch
          mode: watch
          name: jobs
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: extensions
          mode: watch
          name: ingresses
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: networking.k8s.io
          mode: watch
          name: ingresses
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: policy
          mode: watch
          name: poddisruptionbudgets
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: rbac.authorization.k8s.io
          mode: watch
          name: clusterrolebindings
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: rbac.authorization.k8s.io
          mode: watch
          name: clusterroles
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: rbac.authorization.k8s.io
          mode: watch
          name: rolebindings
        - exclude_watch_type:
          - BOOKMARK
          - ERROR
          group: rbac.authorization.k8s.io
          mode: watch
          name: roles
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
            max_recv_msg_size_mib: 20
          http:
            endpoint: ${env:MY_POD_IP}:4318
      prometheus:
        config:
          scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 30s
            static_configs:
            - targets:
              - ${env:MY_POD_IP}:8888
    service:
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - debug
          processors:
          - memory_limiter
          receivers:
          - otlp
        logs/resource_catalog:
          exporters:
          - coralogix/resource_catalog
          processors:
          - memory_limiter
          - resourcedetection/resource_catalog
          - transform/entity-event
          - transform/remove_managed_fields
          - filter/workflow
          - filter/workflow-custom
          - resource/metadata
          - transform/kubernetes_transform
          - batch
          receivers:
          - k8sobjects/resource_catalog
        metrics:
          exporters:
          - debug
          processors:
          - memory_limiter
          - transform/prometheus
          receivers:
          - prometheus
          - otlp
        traces:
          exporters:
          - debug
          processors:
          - memory_limiter
          receivers:
          - otlp
      telemetry:
        logs:
          encoding: json
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
                  without_scope_info: false
                  without_type_suffix: false
                  without_units: false
